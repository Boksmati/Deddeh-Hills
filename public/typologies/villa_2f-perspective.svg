<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <defs>
    <linearGradient id="sky2f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DAFC8"/>
      <stop offset="55%" stop-color="#B8D4E2"/>
      <stop offset="100%" stop-color="#D8EAC8"/>
    </linearGradient>
    <linearGradient id="facade2f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F6F2"/>
      <stop offset="100%" stop-color="#EAE6DE"/>
    </linearGradient>
    <linearGradient id="side2f" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8D4CC"/>
      <stop offset="100%" stop-color="#C4C0B8"/>
    </linearGradient>
    <linearGradient id="ground2f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9DC870"/>
      <stop offset="100%" stop-color="#78A850"/>
    </linearGradient>
    <linearGradient id="pool2fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BB8D8"/>
      <stop offset="100%" stop-color="#3A90B8"/>
    </linearGradient>
    <filter id="shadow2f">
      <feDropShadow dx="5" dy="10" stdDeviation="8" flood-color="#1A3810" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="560" fill="url(#sky2f)"/>

  <!-- Hills background -->
  <ellipse cx="180" cy="270" rx="260" ry="75" fill="#8BBD5A" opacity="0.3"/>
  <ellipse cx="620" cy="280" rx="240" ry="65" fill="#7DB050" opacity="0.25"/>

  <!-- Ground -->
  <polygon points="0,390 800,390 800,560 0,560" fill="url(#ground2f)"/>
  <!-- Driveway -->
  <polygon points="340,390 460,390 430,500 370,500" fill="#D0CABC" opacity="0.7"/>
  <line x1="400" y1="390" x2="400" y2="500" stroke="#C0BAA8" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>

  <!-- Building shadow -->
  <ellipse cx="400" cy="395" rx="230" ry="16" fill="#1A3810" opacity="0.15"/>

  <!-- ── BUILDING VOLUME ──────────────────────────────────── -->
  <!-- Right side face (recessed) -->
  <polygon points="590,120 650,142 650,388 590,368" fill="url(#side2f)" filter="url(#shadow2f)"/>

  <!-- Main facade (2-storey, flat roof) -->
  <rect x="160" y="115" width="430" height="275" rx="2" fill="url(#facade2f)" filter="url(#shadow2f)"/>

  <!-- ── GROUND FLOOR DETAILS ──────────────────────────────── -->
  <!-- GF: Living / Salon window (left portion) -->
  <rect x="178" y="270" width="90" height="120" rx="3" fill="#8BBFD8" opacity="0.65"/>
  <line x1="222" y1="270" x2="222" y2="390" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="178" y="270" width="90" height="9" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- GF: Salon window (center-left) -->
  <rect x="288" y="270" width="80" height="120" rx="3" fill="#8BBFD8" opacity="0.65"/>
  <line x1="328" y1="270" x2="328" y2="390" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="288" y="270" width="80" height="9" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- GF: Entry door + canopy -->
  <rect x="388" y="300" width="70" height="90" rx="2" fill="#7DAFC8" opacity="0.85"/>
  <polygon points="378,302 470,302 460,285 390,285" fill="#2D5A27" opacity="0.88"/>
  <line x1="422" y1="300" x2="422" y2="390" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="423" y="358" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="700" fill="white">ENTRY</text>

  <!-- GF: Kitchen / service windows -->
  <rect x="478" y="310" width="52" height="80" rx="2" fill="#9BC8DC" opacity="0.55"/>
  <rect x="544" y="310" width="40" height="80" rx="2" fill="#9BC8DC" opacity="0.55"/>

  <!-- ── FIRST FLOOR DETAILS ───────────────────────────────── -->
  <!-- F1 slab line -->
  <rect x="160" y="262" width="430" height="10" rx="0" fill="#E0DDD6"/>

  <!-- F1: Master bedroom windows (left) -->
  <rect x="178" y="148" width="85" height="100" rx="3" fill="#9BC8DC" opacity="0.6"/>
  <line x1="220" y1="148" x2="220" y2="248" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="178" y="148" width="85" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- F1: Master bedroom 02 windows -->
  <rect x="278" y="148" width="85" height="100" rx="3" fill="#9BC8DC" opacity="0.6"/>
  <line x1="320" y1="148" x2="320" y2="248" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="278" y="148" width="85" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- F1: Main master bedroom window (large) -->
  <rect x="378" y="140" width="120" height="108" rx="3" fill="#9BC8DC" opacity="0.6"/>
  <line x1="437" y1="140" x2="437" y2="248" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="378" y="140" width="120" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- F1: Office window -->
  <rect x="514" y="155" width="70" height="93" rx="2" fill="#9BC8DC" opacity="0.55"/>

  <!-- ── ROOFTOP (flat roof with parapet) ─────────────────── -->
  <rect x="160" y="108" width="430" height="12" rx="2" fill="#2D5A27"/>
  <!-- Parapet battlement detail -->
  <rect x="172" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="215" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="258" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="301" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="344" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="387" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="430" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="473" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="516" y="98" width="28" height="16" rx="1" fill="#2D5225"/>
  <rect x="557" y="98" width="28" height="16" rx="1" fill="#2D5225"/>

  <!-- Rooftop planters -->
  <ellipse cx="240" cy="102" rx="20" ry="10" fill="#78BF42" opacity="0.75"/>
  <ellipse cx="360" cy="102" rx="16" ry="9" fill="#95CC58" opacity="0.70"/>
  <ellipse cx="490" cy="102" rx="22" ry="11" fill="#78BF42" opacity="0.75"/>

  <!-- ── POOL TERRACE (right of building, front) ───────────── -->
  <!-- Pool surround deck -->
  <polygon points="590,142 720,168 720,370 590,345" fill="#D8D0B8" opacity="0.55"/>
  <!-- Pool water -->
  <polygon points="605,162 698,184 698,338 605,316" fill="url(#pool2fp)" opacity="0.85"/>
  <!-- Pool reflection shimmer -->
  <line x1="615" y1="200" x2="690" y2="215" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="612" y1="230" x2="692" y2="248" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="610" y1="265" x2="694" y2="285" stroke="white" stroke-width="1" opacity="0.25"/>
  <text x="653" y="260" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" font-weight="700" fill="white" opacity="0.85" transform="rotate(-5, 653, 260)">POOL</text>

  <!-- Pool coping edge -->
  <line x1="590" y1="142" x2="720" y2="168" stroke="#A8D8F0" stroke-width="2"/>
  <line x1="590" y1="345" x2="720" y2="370" stroke="#A8D8F0" stroke-width="1.5"/>

  <!-- ── GARDEN / FOREGROUND ───────────────────────────────── -->
  <!-- Shrubs -->
  <ellipse cx="130" cy="388" rx="42" ry="22" fill="#5A9040" opacity="0.8"/>
  <ellipse cx="112" cy="382" rx="30" ry="16" fill="#6EAA4C" opacity="0.85"/>
  <ellipse cx="700" cy="386" rx="38" ry="20" fill="#5A9040" opacity="0.75"/>

  <!-- Trees -->
  <rect x="78" y="305" width="8" height="85" fill="#6B4226"/>
  <ellipse cx="82" cy="295" rx="34" ry="40" fill="#4A8830" opacity="0.9"/>
  <ellipse cx="82" cy="282" rx="24" ry="28" fill="#5A9840" opacity="0.85"/>
  <rect x="720" y="300" width="8" height="90" fill="#6B4226"/>
  <ellipse cx="724" cy="290" rx="32" ry="38" fill="#4A8830" opacity="0.88"/>
  <ellipse cx="724" cy="278" rx="22" ry="26" fill="#5A9840" opacity="0.82"/>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <rect x="0" y="0" width="800" height="52" fill="rgba(26,56,16,0.82)"/>
  <text x="24" y="20" font-family="'DM Sans',sans-serif" font-size="8" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="24" y="40" font-family="'DM Sans',sans-serif" font-size="16" font-weight="700" fill="white">Villa 2F — Two-Storey with Pool</text>
  <text x="776" y="20" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">GF + F1 · 3 masters · ~665 m² BUA</text>
  <text x="776" y="38" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Koura, Lebanon</text>

  <!-- ── CAPTION BAR ─────────────────────────────────────────── -->
  <rect x="0" y="508" width="800" height="52" fill="rgba(26,56,16,0.78)"/>
  <text x="24" y="528" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="#78BF42">Ground Floor: Parking · Kitchen · Salon · Dining · Sitting Room · Guest WC</text>
  <text x="24" y="548" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">First Floor: 3 Master Bedrooms (each with Dressing + Bathroom) · Living · Office · Balcony · Private Pool Terrace</text>
  <text x="776" y="540" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Illustrative rendering only</text>
</svg>
