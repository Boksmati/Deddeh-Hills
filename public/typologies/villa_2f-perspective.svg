<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6F0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8F4F9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A8CC88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#88AA68;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDE6;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#E8E4DA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D8D3C8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="walll2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0DDD6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8C4BA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7A40;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2D5A27;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Mountains in background -->
  <polygon points="0,300 120,160 250,260 380,130 510,220 650,140 800,200 800,320 0,320" fill="#B8CDB8" opacity="0.5"/>
  <polygon points="0,320 100,200 200,280 350,170 500,250 680,160 800,210 800,340 0,340" fill="#C8D8C0" opacity="0.4"/>

  <!-- Ground / lawn -->
  <rect x="0" y="420" width="800" height="180" fill="url(#grass)"/>

  <!-- Shadow on ground -->
  <ellipse cx="330" cy="428" rx="200" ry="18" fill="rgba(0,0,0,0.12)"/>

  <!-- ── VILLA BODY ───────────────────────────────── -->

  <!-- Ground floor main body -->
  <rect x="80" y="270" width="480" height="160" fill="url(#wall)" filter="url(#shadow)"/>

  <!-- Second floor (slightly inset) -->
  <rect x="80" y="160" width="480" height="115" fill="url(#walll2)"/>

  <!-- Flat roof / parapet -->
  <rect x="70" y="145" width="500" height="20" fill="#2D5A27"/>
  <rect x="70" y="145" width="500" height="6" fill="#78BF42" opacity="0.5"/>

  <!-- Roof overhang line -->
  <line x1="65" y1="165" x2="585" y2="165" stroke="#1A3810" stroke-width="1.5" opacity="0.4"/>

  <!-- Ground floor garage (left) -->
  <rect x="90" y="282" width="140" height="140" fill="#D8D4CB"/>
  <rect x="90" y="282" width="140" height="140" fill="none" stroke="#B8B4AA" stroke-width="2"/>
  <!-- garage door panels -->
  <line x1="120" y1="282" x2="120" y2="422" stroke="#B8B4AA" stroke-width="1.5"/>
  <line x1="150" y1="282" x2="150" y2="422" stroke="#B8B4AA" stroke-width="1.5"/>
  <line x1="180" y1="282" x2="180" y2="422" stroke="#B8B4AA" stroke-width="1.5"/>
  <line x1="210" y1="282" x2="210" y2="422" stroke="#B8B4AA" stroke-width="1.5"/>
  <line x1="90" y1="320" x2="230" y2="320" stroke="#B8B4AA" stroke-width="1"/>
  <line x1="90" y1="360" x2="230" y2="360" stroke="#B8B4AA" stroke-width="1"/>
  <line x1="90" y1="400" x2="230" y2="400" stroke="#B8B4AA" stroke-width="1"/>

  <!-- Windows ground floor -->
  <!-- Window 1 -->
  <rect x="250" y="305" width="80" height="70" fill="#C8E0EC" stroke="#A0BCCC" stroke-width="2"/>
  <line x1="290" y1="305" x2="290" y2="375" stroke="#A0BCCC" stroke-width="1"/>
  <line x1="250" y1="340" x2="330" y2="340" stroke="#A0BCCC" stroke-width="1"/>

  <!-- Window 2 -->
  <rect x="360" y="305" width="80" height="70" fill="#C8E0EC" stroke="#A0BCCC" stroke-width="2"/>
  <line x1="400" y1="305" x2="400" y2="375" stroke="#A0BCCC" stroke-width="1"/>
  <line x1="360" y1="340" x2="440" y2="340" stroke="#A0BCCC" stroke-width="1"/>

  <!-- Main entrance door -->
  <rect x="455" y="330" width="85" height="92" fill="#8B7355" stroke="#6B5535" stroke-width="2"/>
  <rect x="465" y="340" width="30" height="72" fill="#A0886A" stroke="#6B5535" stroke-width="1"/>
  <rect x="500" y="340" width="30" height="72" fill="#A0886A" stroke="#6B5535" stroke-width="1"/>
  <circle cx="498" cy="386" r="4" fill="#C8A860"/>
  <circle cx="502" cy="386" r="4" fill="#C8A860"/>

  <!-- First floor windows -->
  <rect x="90" y="185" width="90" height="50" fill="#C8E0EC" stroke="#A0BCCC" stroke-width="1.5"/>
  <line x1="135" y1="185" x2="135" y2="235" stroke="#A0BCCC" stroke-width="1"/>

  <rect x="200" y="185" width="90" height="50" fill="#C8E0EC" stroke="#A0BCCC" stroke-width="1.5"/>
  <line x1="245" y1="185" x2="245" y2="235" stroke="#A0BCCC" stroke-width="1"/>

  <rect x="310" y="185" width="90" height="50" fill="#C8E0EC" stroke="#A0BCCC" stroke-width="1.5"/>
  <line x1="355" y1="185" x2="355" y2="235" stroke="#A0BCCC" stroke-width="1"/>

  <rect x="420" y="185" width="90" height="50" fill="#C8E0EC" stroke="#A0BCCC" stroke-width="1.5"/>
  <line x1="465" y1="185" x2="465" y2="235" stroke="#A0BCCC" stroke-width="1"/>

  <!-- Balcony railing (first floor) -->
  <rect x="80" y="265" width="480" height="10" fill="#E0DDD6" stroke="#C8C4BA" stroke-width="1"/>
  <!-- railing balusters -->
  <line x1="100" y1="250" x2="100" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="120" y1="250" x2="120" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="140" y1="250" x2="140" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="160" y1="250" x2="160" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="180" y1="250" x2="180" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="200" y1="250" x2="200" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="220" y1="250" x2="220" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="240" y1="250" x2="240" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="260" y1="250" x2="260" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="280" y1="250" x2="280" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="300" y1="250" x2="300" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="320" y1="250" x2="320" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="340" y1="250" x2="340" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="360" y1="250" x2="360" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="380" y1="250" x2="380" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="400" y1="250" x2="400" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="420" y1="250" x2="420" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="440" y1="250" x2="440" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="460" y1="250" x2="460" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="480" y1="250" x2="480" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="500" y1="250" x2="500" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="520" y1="250" x2="520" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <line x1="540" y1="250" x2="540" y2="275" stroke="#C0BDB5" stroke-width="1.5"/>
  <rect x="80" y="248" width="480" height="6" fill="#D8D4CB"/>

  <!-- Driveway -->
  <path d="M160 422 L120 500 L230 500 L270 422 Z" fill="#C8C0B0" opacity="0.7"/>
  <line x1="150" y1="422" x2="115" y2="500" stroke="#B8B0A0" stroke-width="1"/>
  <line x1="280" y1="422" x2="245" y2="500" stroke="#B8B0A0" stroke-width="1"/>

  <!-- Landscaping - hedge -->
  <rect x="80" y="420" width="640" height="14" rx="4" fill="#5A9A3A" opacity="0.6"/>

  <!-- Trees -->
  <ellipse cx="650" cy="380" rx="40" ry="55" fill="#4A8A30" opacity="0.8"/>
  <rect x="646" y="420" width="8" height="30" fill="#6B4A2A"/>
  <ellipse cx="710" cy="395" rx="30" ry="45" fill="#5A9A40" opacity="0.7"/>
  <rect x="707" y="424" width="6" height="25" fill="#6B4A2A"/>

  <!-- Small shrubs near entrance -->
  <ellipse cx="440" cy="426" rx="18" ry="12" fill="#4A8A30" opacity="0.7"/>
  <ellipse cx="570" cy="424" rx="22" ry="14" fill="#5A9A3A" opacity="0.7"/>

  <!-- Header overlay (bottom label) -->
  <rect x="0" y="542" width="800" height="58" fill="rgba(26,56,16,0.88)"/>
  <text x="30" y="565" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#78BF42" letter-spacing="2">DEDDEH HILLS</text>
  <text x="30" y="584" font-family="'DM Sans',sans-serif" font-size="16" font-weight="700" fill="white">Villa 2F — Standalone Villa</text>
  <text x="750" y="575" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">Exterior Perspective · Indicative</text>
</svg>
