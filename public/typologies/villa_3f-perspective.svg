<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <defs>
    <linearGradient id="sky3fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8FB0"/>
      <stop offset="50%" stop-color="#9EC4D8"/>
      <stop offset="100%" stop-color="#CBE4C0"/>
    </linearGradient>
    <linearGradient id="facade3fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F6F2"/>
      <stop offset="100%" stop-color="#E8E4DC"/>
    </linearGradient>
    <linearGradient id="side3fp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4D0C8"/>
      <stop offset="100%" stop-color="#BCB8B0"/>
    </linearGradient>
    <linearGradient id="ground3fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9DC870"/>
      <stop offset="100%" stop-color="#78A850"/>
    </linearGradient>
    <linearGradient id="pool3fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BB8D8"/>
      <stop offset="100%" stop-color="#3A90B8"/>
    </linearGradient>
    <linearGradient id="basmt3fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D4CC"/>
      <stop offset="100%" stop-color="#C8C4BC"/>
    </linearGradient>
    <filter id="shadow3fp">
      <feDropShadow dx="6" dy="12" stdDeviation="10" flood-color="#1A3810" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="560" fill="url(#sky3fp)"/>

  <!-- Hills background -->
  <ellipse cx="160" cy="255" rx="240" ry="70" fill="#7AB84E" opacity="0.25"/>
  <ellipse cx="640" cy="260" rx="200" ry="60" fill="#6EAC44" opacity="0.20"/>

  <!-- Ground plane -->
  <polygon points="0,400 800,400 800,560 0,560" fill="url(#ground3fp)"/>
  <!-- Driveway / path -->
  <polygon points="360,400 440,400 415,510 385,510" fill="#D0CABC" opacity="0.7"/>
  <line x1="400" y1="400" x2="400" y2="510" stroke="#C0BAA8" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>

  <!-- Building shadow on ground -->
  <ellipse cx="400" cy="404" rx="250" ry="18" fill="#1A3810" opacity="0.12"/>

  <!-- ── BASEMENT LEVEL (partially exposed, stone cladding) ── -->
  <rect x="150" y="350" width="460" height="55" rx="1" fill="url(#basmt3fp)" filter="url(#shadow3fp)"/>
  <!-- Stone coursing lines on basement -->
  <line x1="150" y1="365" x2="610" y2="365" stroke="#B0ACA4" stroke-width="0.7" opacity="0.5"/>
  <line x1="150" y1="380" x2="610" y2="380" stroke="#B0ACA4" stroke-width="0.7" opacity="0.5"/>
  <line x1="150" y1="395" x2="610" y2="395" stroke="#B0ACA4" stroke-width="0.7" opacity="0.5"/>
  <!-- Basement windows (small, ventilation) -->
  <rect x="180" y="368" width="40" height="20" rx="2" fill="#6A9AB8" opacity="0.5"/>
  <rect x="240" y="368" width="40" height="20" rx="2" fill="#6A9AB8" opacity="0.5"/>
  <rect x="390" y="368" width="40" height="20" rx="2" fill="#6A9AB8" opacity="0.5"/>
  <rect x="510" y="368" width="40" height="20" rx="2" fill="#6A9AB8" opacity="0.5"/>

  <!-- ── RIGHT SIDE FACE (3-storey recessed) ──────────────── -->
  <polygon points="610,90 685,116 685,354 610,328" fill="url(#side3fp)" filter="url(#shadow3fp)"/>
  <!-- Side windows -->
  <rect x="620" y="126" width="42" height="55" rx="2" fill="#7DAFC8" opacity="0.45"/>
  <rect x="620" y="202" width="42" height="55" rx="2" fill="#7DAFC8" opacity="0.45"/>
  <rect x="620" y="278" width="42" height="42" rx="2" fill="#7DAFC8" opacity="0.4"/>

  <!-- ── MAIN FACADE (3-storey) ──────────────────────────── -->
  <rect x="150" y="80" width="460" height="275" rx="2" fill="url(#facade3fp)" filter="url(#shadow3fp)"/>

  <!-- ── SECOND FLOOR (F2) — top zone ─────────────────── -->
  <!-- F2 slab line -->
  <rect x="150" y="170" width="460" height="10" rx="0" fill="#DDDAD2"/>

  <!-- F2: Master bedroom windows (large, with small balconies) -->
  <rect x="166" y="90" width="90" height="75" rx="3" fill="#9BC8DC" opacity="0.60"/>
  <line x1="210" y1="90" x2="210" y2="165" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="166" y="90" width="90" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>
  <!-- Mini balcony rail (F2) -->
  <rect x="160" y="162" width="100" height="8" rx="1" fill="#2D5A27" opacity="0.7"/>
  <line x1="170" y1="165" x2="170" y2="172" stroke="#2D5A27" stroke-width="1" opacity="0.6"/>
  <line x1="190" y1="165" x2="190" y2="172" stroke="#2D5A27" stroke-width="1" opacity="0.6"/>
  <line x1="210" y1="165" x2="210" y2="172" stroke="#2D5A27" stroke-width="1" opacity="0.6"/>
  <line x1="230" y1="165" x2="230" y2="172" stroke="#2D5A27" stroke-width="1" opacity="0.6"/>
  <line x1="250" y1="165" x2="250" y2="172" stroke="#2D5A27" stroke-width="1" opacity="0.6"/>

  <rect x="270" y="90" width="90" height="75" rx="3" fill="#9BC8DC" opacity="0.60"/>
  <line x1="314" y1="90" x2="314" y2="165" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="270" y="90" width="90" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>
  <rect x="264" y="162" width="100" height="8" rx="1" fill="#2D5A27" opacity="0.7"/>

  <!-- F2 Main master — large window -->
  <rect x="376" y="85" width="130" height="80" rx="3" fill="#9BC8DC" opacity="0.60"/>
  <line x1="440" y1="85" x2="440" y2="165" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <rect x="376" y="85" width="130" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>
  <rect x="370" y="162" width="140" height="8" rx="1" fill="#2D5A27" opacity="0.7"/>

  <!-- F2: small window right -->
  <rect x="522" y="100" width="75" height="62" rx="2" fill="#9BC8DC" opacity="0.50"/>

  <!-- ── FIRST FLOOR (F1) ─────────────────────────────── -->
  <!-- F1 slab line -->
  <rect x="150" y="250" width="460" height="10" rx="0" fill="#DDDAD2"/>

  <!-- F1: Living room windows -->
  <rect x="166" y="180" width="90" height="65" rx="3" fill="#9BC8DC" opacity="0.58"/>
  <line x1="210" y1="180" x2="210" y2="245" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="166" y="180" width="90" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <rect x="270" y="180" width="90" height="65" rx="3" fill="#9BC8DC" opacity="0.58"/>
  <line x1="314" y1="180" x2="314" y2="245" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="270" y="180" width="90" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- F1: Large window + Office -->
  <rect x="376" y="178" width="130" height="67" rx="3" fill="#9BC8DC" opacity="0.55"/>
  <line x1="440" y1="178" x2="440" y2="245" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <rect x="376" y="178" width="130" height="8" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <rect x="522" y="185" width="75" height="60" rx="2" fill="#9BC8DC" opacity="0.45"/>

  <!-- ── GROUND FLOOR (GF) ────────────────────────────── -->
  <!-- GF: Salon windows -->
  <rect x="166" y="262" width="85" height="90" rx="3" fill="#8BBFD8" opacity="0.65"/>
  <line x1="207" y1="262" x2="207" y2="352" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="166" y="262" width="85" height="9" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <rect x="265" y="262" width="85" height="90" rx="3" fill="#8BBFD8" opacity="0.65"/>
  <line x1="306" y1="262" x2="306" y2="352" stroke="white" stroke-width="1" opacity="0.5"/>
  <rect x="265" y="262" width="85" height="9" rx="1" fill="#E8E4DC" opacity="0.85"/>

  <!-- GF: Entry door -->
  <rect x="365" y="288" width="68" height="67" rx="2" fill="#7DAFC8" opacity="0.85"/>
  <polygon points="355,290 445,290 435,273 366,273" fill="#2D5A27" opacity="0.88"/>
  <line x1="398" y1="288" x2="398" y2="355" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="399" y="330" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="700" fill="white">ENTRY</text>

  <!-- GF: Kitchen windows -->
  <rect x="448" y="300" width="60" height="55" rx="2" fill="#9BC8DC" opacity="0.55"/>
  <rect x="524" y="300" width="74" height="55" rx="2" fill="#9BC8DC" opacity="0.50"/>

  <!-- ── POOL (left of building, GF level) ──────────────── -->
  <!-- Pool deck -->
  <polygon points="60,130 150,108 150,354 60,376" fill="#D4CEB8" opacity="0.55"/>
  <!-- Pool water -->
  <polygon points="72,152 143,133 143,338 72,356" fill="url(#pool3fp)" opacity="0.88"/>
  <!-- Pool shimmer lines -->
  <line x1="80" y1="175" x2="137" y2="162" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="78" y1="210" x2="140" y2="196" stroke="white" stroke-width="1" opacity="0.28"/>
  <line x1="76" y1="250" x2="140" y2="234" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="75" y1="290" x2="141" y2="274" stroke="white" stroke-width="1" opacity="0.22"/>
  <text x="108" y="255" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" font-weight="700" fill="white" opacity="0.85" transform="rotate(-5,108,255)">POOL</text>
  <!-- Pool coping edge -->
  <line x1="60" y1="130" x2="150" y2="108" stroke="#A8D8F0" stroke-width="2"/>
  <line x1="60" y1="376" x2="150" y2="354" stroke="#A8D8F0" stroke-width="1.5"/>

  <!-- ── ROOFTOP (flat roof + parapet) ────────────────── -->
  <rect x="150" y="72" width="460" height="14" rx="2" fill="#2D5A27"/>
  <!-- Parapet crenellations -->
  <rect x="162" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="202" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="242" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="282" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="322" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="362" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="402" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="442" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="482" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="522" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <rect x="562" y="60" width="26" height="18" rx="1" fill="#2D5225"/>
  <!-- Rooftop planters -->
  <ellipse cx="220" cy="68" rx="22" ry="10" fill="#78BF42" opacity="0.75"/>
  <ellipse cx="340" cy="68" rx="18" ry="9" fill="#95CC58" opacity="0.70"/>
  <ellipse cx="470" cy="68" rx="24" ry="11" fill="#78BF42" opacity="0.75"/>

  <!-- ── GARDEN / FOREGROUND ─────────────────────────── -->
  <!-- Shrubs -->
  <ellipse cx="720" cy="398" rx="42" ry="22" fill="#5A9040" opacity="0.82"/>
  <ellipse cx="700" cy="392" rx="28" ry="15" fill="#6EAA4C" opacity="0.85"/>
  <!-- Left garden -->
  <ellipse cx="30" cy="396" rx="36" ry="20" fill="#5A9040" opacity="0.78"/>
  <!-- Trees (right) -->
  <rect x="735" y="310" width="8" height="90" fill="#6B4226"/>
  <ellipse cx="739" cy="300" rx="32" ry="38" fill="#4A8830" opacity="0.90"/>
  <ellipse cx="739" cy="288" rx="22" ry="26" fill="#5A9840" opacity="0.85"/>
  <!-- Left cypress -->
  <rect x="30" y="290" width="7" height="112" fill="#6B4226"/>
  <ellipse cx="33" cy="270" rx="15" ry="50" fill="#2D5A27" opacity="0.85"/>

  <!-- ── HEADER ────────────────────────────────────────── -->
  <rect x="0" y="0" width="800" height="52" fill="rgba(26,56,16,0.84)"/>
  <text x="24" y="20" font-family="'DM Sans',sans-serif" font-size="8" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="24" y="40" font-family="'DM Sans',sans-serif" font-size="16" font-weight="700" fill="white">Villa 3F — Three-Storey with Pool</text>
  <text x="776" y="20" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">B1 + GF + F1 + F2 · 3 masters · ~665 m² BUA</text>
  <text x="776" y="38" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Koura, Lebanon</text>

  <!-- ── CAPTION BAR ─────────────────────────────────── -->
  <rect x="0" y="508" width="800" height="52" fill="rgba(26,56,16,0.78)"/>
  <text x="24" y="528" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="#78BF42">Basement: Parking · Storage · Utilities · Technical rooms</text>
  <text x="24" y="544" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">GF: Salon · Sitting · Dining · Kitchen · Guest WC · Pool Terrace  ·  F1: Living · Guest Bed · Office · Archive  ·  F2: 3 Master Suites</text>
  <text x="776" y="540" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Illustrative rendering only</text>

</svg>
