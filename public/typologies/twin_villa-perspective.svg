    <linearGradient id="baseTwin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4D0C8"/>
      <stop offset="100%" stop-color="#C4C0B8"/>
    </linearGradient>
    <filter id="shadowT">
      <feDropShadow dx="5" dy="10" stdDeviation="8" flood-color="#1A3810" flood-opacity="0.18"/>
    </filter>
  </defs>

