<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <defs>
    <linearGradient id="skyTwin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A9CBF"/>
      <stop offset="50%" stop-color="#A8CAE0"/>
      <stop offset="100%" stop-color="#CBE4C0"/>
    </linearGradient>
    <linearGradient id="facadeA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F6F2"/>
      <stop offset="100%" stop-color="#E8E4DC"/>
    </linearGradient>
    <linearGradient id="facadeB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F2EE"/>
      <stop offset="100%" stop-color="#E4E0D8"/>
    </linearGradient>
    <linearGradient id="sideT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D0CCC4"/>
      <stop offset="100%" stop-color="#BCB8B0"/>
    </linearGradient>
    <linearGradient id="groundT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9DC870"/>
      <stop offset="100%" stop-color="#78A850"/>
