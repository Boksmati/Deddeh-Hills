  <text x="24" y="20" font-family="'DM Sans',sans-serif" font-size="8" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="24" y="40" font-family="'DM Sans',sans-serif" font-size="16" font-weight="700" fill="white">Twin Villa — Two Semi-Detached Units with Private Pools</text>
  <text x="776" y="20" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">OPG + GF + F1 · 3 beds/unit · ~260 m² BUA/unit</text>
