  <text x="24" y="527" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="#78BF42">Each unit: Garage · Salon · Sitting · Dining · Kitchen · Guest WC · Maid · Laundry · Pool Terrace</text>
