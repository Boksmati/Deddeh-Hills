  <ellipse cx="362" cy="328" rx="10" ry="6" fill="#F0EBE0"/>
  <!-- Bedside tables -->
  <rect x="290" y="318" width="18" height="18" rx="2" fill="#DDD0C0"/>
  <rect x="387" y="318" width="18" height="18" rx="2" fill="#DDD0C0"/>
  <!-- Wardrobe -->
