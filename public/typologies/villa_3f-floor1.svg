  <text x="170" y="372" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="600" fill="#4A90B8">VOID</text>
  <text x="170" y="388" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#7DAFC8">over pool below</text>
