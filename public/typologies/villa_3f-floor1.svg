  <rect x="30" y="782" width="140" height="58" rx="8" fill="rgba(26,56,16,0.88)"/>
  <text x="100" y="806" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#78BF42" letter-spacing="1">FLOOR AREA</text>
  <text x="100" y="826" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="18" font-weight="700" fill="white">260 m²</text>
  <text x="100" y="840" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">gross BUA incl. terrace</text>

