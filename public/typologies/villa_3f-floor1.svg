  <line x1="552" y1="270" x2="628" y2="270" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="280" x2="628" y2="280" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="290" x2="628" y2="290" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="300" x2="628" y2="300" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="310" x2="628" y2="310" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="320" x2="628" y2="320" stroke="#9CA3AF" stroke-width="1"/>
  <polygon points="590,338 584,328 596,328" fill="#9CA3AF" opacity="0.8"/>
  <text x="590" y="348" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="7" fill="#6B7280">DN TO GF</text>
  <!-- Lift symbol -->
  <rect x="556" y="380" width="35" height="35" rx="2" fill="#E0D8F0" stroke="#9088C0" stroke-width="1.5"/>
  <text x="573" y="396" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9088C0">LIFT</text>
