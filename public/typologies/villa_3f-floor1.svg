  <rect x="454" y="568" width="76" height="44" rx="2" fill="#D8EEF8" stroke="#7DAFC8" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="492" y1="568" x2="492" y2="612" stroke="#7DAFC8" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="490" y="596" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#4A90B8">WC / BATH</text>

