  <text x="30" y="26" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="30" y="48" font-family="'DM Sans',sans-serif" font-size="18" font-weight="700" fill="white">Villa 3F — First Floor (F1)</text>
  <text x="30" y="63" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Villa Type 01 · B1 + GF + F1 + F2 · ~665 m² BUA</text>
  <text x="670" y="48" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">F1 BUA ≈ 260 m²</text>

  <!-- ── OUTER BUILDING SHELL ──────────────────────────── -->
