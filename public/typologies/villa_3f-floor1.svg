  <rect x="196" y="793" width="12" height="12" rx="2" fill="#FFF8F0" stroke="#2D3748" stroke-width="1"/>
  <text x="214" y="803" font-family="'DM Sans',sans-serif" font-size="8" fill="#374151">Habitable</text>
  <rect x="260" y="793" width="12" height="12" rx="2" fill="#EEF6FE" stroke="#7DAFC8" stroke-width="1"/>
  <text x="278" y="803" font-family="'DM Sans',sans-serif" font-size="8" fill="#374151">Wet rooms</text>
  <rect x="340" y="793" width="12" height="12" rx="2" fill="url(#void3f1)" stroke="#A8D4E8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="358" y="803" font-family="'DM Sans',sans-serif" font-size="8" fill="#374151">Void (dbl-height)</text>
  <rect x="196" y="812" width="12" height="12" rx="2" fill="#EAF4E0" stroke="#78BF42" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="214" y="822" font-family="'DM Sans',sans-serif" font-size="8" fill="#374151">Terrace / outdoor</text>
  <rect x="340" y="812" width="12" height="12" rx="2" fill="#F4F0E8" stroke="#6B7280" stroke-width="1"/>
  <text x="358" y="822" font-family="'DM Sans',sans-serif" font-size="8" fill="#374151">Stair / service</text>
  <text x="303" y="836" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">Deddeh Hills · Villa 3F · F1 · Illustrative only</text>

