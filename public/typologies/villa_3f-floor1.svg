  <line x1="411" y1="551" x2="536" y2="551" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="411" y1="567" x2="536" y2="567" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="411" y1="583" x2="536" y2="583" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="411" y1="599" x2="536" y2="599" stroke="#9CA3AF" stroke-width="1"/>
  <text x="474" y="612" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#9CA3AF">TO ROOF FLOOR ↑</text>

