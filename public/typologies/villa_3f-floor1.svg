  <text x="499" y="462" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">BATHROOM</text>
  <text x="499" y="473" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">7 m²</text>

