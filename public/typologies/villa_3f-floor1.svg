  <line x1="60" y1="290" x2="60" y2="310" stroke="#A8D4E8" stroke-width="1.5"/>
  <line x1="280" y1="290" x2="260" y2="290" stroke="#A8D4E8" stroke-width="1.5"/>
  <line x1="280" y1="290" x2="280" y2="310" stroke="#A8D4E8" stroke-width="1.5"/>
  <line x1="60" y1="480" x2="80" y2="480" stroke="#A8D4E8" stroke-width="1.5"/>
  <line x1="60" y1="480" x2="60" y2="460" stroke="#A8D4E8" stroke-width="1.5"/>
  <line x1="280" y1="480" x2="260" y2="480" stroke="#A8D4E8" stroke-width="1.5"/>
  <line x1="280" y1="480" x2="280" y2="460" stroke="#A8D4E8" stroke-width="1.5"/>

