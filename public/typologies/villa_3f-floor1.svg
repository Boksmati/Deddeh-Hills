  <!-- Railing lines -->
  <rect x="60" y="100" width="220" height="180" fill="none" stroke="#78BF42" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="65" y1="105" x2="275" y2="105" stroke="#78BF42" stroke-width="1.5" opacity="0.7"/>
  <line x1="65" y1="275" x2="275" y2="275" stroke="#78BF42" stroke-width="1.5" opacity="0.7"/>
  <!-- Planters on terrace -->
  <rect x="72" y="108" width="30" height="10" rx="2" fill="#5A9040" opacity="0.7"/>
  <rect x="110" y="108" width="30" height="10" rx="2" fill="#5A9040" opacity="0.7"/>
  <rect x="148" y="108" width="30" height="10" rx="2" fill="#5A9040" opacity="0.7"/>
  <rect x="186" y="108" width="30" height="10" rx="2" fill="#5A9040" opacity="0.7"/>
  <rect x="72" y="268" width="30" height="10" rx="2" fill="#5A9040" opacity="0.7"/>
  <rect x="148" y="268" width="60" height="10" rx="2" fill="#5A9040" opacity="0.7"/>
  <text x="170" y="205" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="600" fill="#2D5A27">TERRACE</text>
  <text x="170" y="221" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#6AAB50">~40 m²</text>
  <text x="170" y="235" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">over pool terrace</text>

