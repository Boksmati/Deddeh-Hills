  <line x1="552" y1="130" x2="628" y2="130" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="140" x2="628" y2="140" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="150" x2="628" y2="150" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="552" y1="160" x2="628" y2="160" stroke="#9CA3AF" stroke-width="1"/>
