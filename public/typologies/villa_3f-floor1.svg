  <rect x="280" y="100" width="260" height="200" fill="#FFF8F0" opacity="0.6"/>
  <!-- Sofa group -->
  <rect x="296" y="150" width="90" height="40" rx="4" fill="#DDD0C0" stroke="#B0A090" stroke-width="1"/>
  <rect x="296" y="190" width="40" height="30" rx="3" fill="#DDD0C0" stroke="#B0A090" stroke-width="1"/>
  <rect x="346" y="190" width="40" height="30" rx="3" fill="#DDD0C0" stroke="#B0A090" stroke-width="1"/>
  <rect x="310" y="120" width="50" height="30" rx="2" fill="#E8DDD0" stroke="#C0B0A0" stroke-width="1" opacity="0.7"/>
