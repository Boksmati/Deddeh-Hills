  <rect x="60" y="100" width="580" height="680" rx="2" fill="none" stroke="#2D3748" stroke-width="3"/>
  <!-- Stair/lift core cut-out indicated on right -->
  <rect x="540" y="100" width="100" height="120" fill="#F0EDE8" stroke="#2D3748" stroke-width="1.5"/>

