  <line x1="400" y1="660" x2="400" y2="780" stroke="#78BF42" stroke-width="0.8" opacity="0.4"/>
  <line x1="460" y1="660" x2="460" y2="780" stroke="#78BF42" stroke-width="0.8" opacity="0.4"/>
  <text x="300" y="722" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="600" fill="#2D5A27">COVERED TERRACE</text>
  <text x="300" y="738" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#6AAB50">~60 m²</text>

