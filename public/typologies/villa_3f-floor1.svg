  <line x1="360" y1="430" x2="360" y2="455" stroke="#B8B0A4" stroke-width="1"/>
  <text x="360" y="410" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="#374151">GUEST BED</text>
  <text x="360" y="425" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#6B7280">~36 m²</text>

