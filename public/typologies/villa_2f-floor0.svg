<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <pattern id="garden" patternUnits="userSpaceOnUse" width="10" height="10">
      <path d="M0,5 Q2.5,0 5,5 Q7.5,10 10,5" fill="none" stroke="#95CC58" stroke-width="0.8" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="#FAFAF9"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="600" height="72" fill="#1A3810"/>
  <text x="30" y="28" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="30" y="50" font-family="'DM Sans',sans-serif" font-size="18" font-weight="700" fill="white">Villa 2F — Ground Floor</text>
  <text x="30" y="64" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">indicative · not to scale · BUA ~185 m²</text>

  <!-- Building shadow -->
  <rect x="54" y="92" width="496" height="580" rx="3" fill="#D1D5DB" opacity="0.4"/>

  <!-- Building outer wall (dark fill = wall material) -->
  <rect x="50" y="88" width="496" height="580" rx="2" fill="#374151"/>

  <!-- ── ROOMS ─────────────────────────────────────────── -->

  <!-- GARAGE (left col, top) -->
  <rect x="56" y="94" width="196" height="204" fill="#ECEAE5"/>
  <!-- car symbols -->
  <rect x="72" y="136" width="72" height="44" rx="6" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="155" y="136" width="72" height="44" rx="6" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="154" y="118" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#4B5563">GARAGE</text>
  <text x="154" y="200" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#9CA3AF">2 cars · 38 m²</text>
  <!-- garage door line -->
  <line x1="56" y1="94" x2="252" y2="94" stroke="#6B7280" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- ENTRY HALL (center-top) -->
  <rect x="256" y="94" width="130" height="100" fill="#F3F2EF"/>
  <text x="321" y="134" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="600" fill="#374151">ENTRY</text>
  <text x="321" y="150" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="#374151">HALL</text>
  <text x="321" y="166" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">9 m²</text>
  <!-- door -->
  <line x1="256" y1="94" x2="256" y2="119" stroke="#F3F2EF" stroke-width="2"/>
  <path d="M256 119 A25 25 0 0 1 281 94" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- GUEST BEDROOM (right col, top) -->
  <rect x="390" y="94" width="150" height="204" fill="#EBF3FA"/>
  <!-- bed symbol -->
  <rect x="405" y="108" width="120" height="65" rx="5" fill="none" stroke="#93C5D8" stroke-width="1.5"/>
  <rect x="405" y="108" width="120" height="22" rx="5" fill="#B8D9E8" opacity="0.6"/>
  <text x="465" y="204" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#374151">GUEST</text>
  <text x="465" y="219" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#374151">BEDROOM</text>
  <text x="465" y="234" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">14 m²</text>

  <!-- GUEST WC (center, below entry) -->
  <rect x="256" y="198" width="130" height="100" fill="#E8F4FB"/>
  <!-- wc symbols -->
  <ellipse cx="286" cy="240" rx="14" ry="18" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <rect x="310" y="228" width="22" height="28" rx="11" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <text x="321" y="272" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="#374151">GUEST WC</text>
  <text x="321" y="284" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">5 m²</text>

  <!-- Horizontal wall between row 1 and row 2 -->
  <rect x="56" y="298" width="480" height="5" fill="#374151"/>

  <!-- DINING ROOM (left col, middle) -->
  <rect x="56" y="303" width="196" height="160" fill="#F5F9F1"/>
  <!-- dining table -->
  <ellipse cx="154" cy="380" rx="58" ry="36" fill="none" stroke="#A8C99A" stroke-width="1.5"/>
  <circle cx="120" cy="354" r="8" fill="none" stroke="#A8C99A" stroke-width="1"/>
  <circle cx="188" cy="354" r="8" fill="none" stroke="#A8C99A" stroke-width="1"/>
  <circle cx="120" cy="408" r="8" fill="none" stroke="#A8C99A" stroke-width="1"/>
  <circle cx="188" cy="408" r="8" fill="none" stroke="#A8C99A" stroke-width="1"/>
  <text x="154" y="385" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#374151">DINING</text>
  <text x="154" y="440" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">20 m²</text>

  <!-- Vertical wall between left and center+right columns (middle row) -->
  <rect x="252" y="298" width="5" height="165" fill="#374151"/>

  <!-- LIVING ROOM (center+right, middle) -->
  <rect x="257" y="303" width="279" height="160" fill="#F5F9F1"/>
  <!-- sofa symbols -->
  <rect x="273" y="358" width="130" height="50" rx="6" fill="none" stroke="#A8C99A" stroke-width="1.5"/>
  <rect x="273" y="358" width="130" height="18" rx="4" fill="#C8E0B8" opacity="0.6"/>
  <rect x="273" y="393" width="130" height="18" rx="4" fill="#C8E0B8" opacity="0.4"/>
  <text x="397" y="330" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" font-weight="700" fill="#2D5A27">LIVING ROOM</text>
  <text x="397" y="347" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">45 m²</text>

  <!-- Horizontal wall row 2 bottom -->
  <rect x="56" y="463" width="480" height="5" fill="#374151"/>

  <!-- KITCHEN (left col, lower) -->
  <rect x="56" y="468" width="196" height="120" fill="#FFF4ED"/>
  <!-- kitchen counter -->
  <rect x="60" y="472" width="188" height="22" rx="3" fill="#E8C9A8" stroke="#C9996A" stroke-width="1"/>
  <rect x="164" y="494" width="22" height="18" rx="9" fill="none" stroke="#C9996A" stroke-width="1.5"/>
  <circle cx="174" cy="503" r="5" fill="none" stroke="#C9996A" stroke-width="1"/>
  <text x="154" y="555" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#374151">KITCHEN</text>
  <text x="154" y="572" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">18 m²</text>

  <!-- Vertical wall below center col -->
  <rect x="252" y="463" width="5" height="125" fill="#374151"/>

  <!-- UTILITY / LAUNDRY -->
  <rect x="257" y="468" width="128" height="120" fill="#EDECEA"/>
  <text x="321" y="522" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="600" fill="#4B5563">UTILITY</text>
  <text x="321" y="538" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">9 m²</text>

  <!-- Vertical wall before terrace -->
  <rect x="385" y="298" width="5" height="290" fill="#374151"/>

  <!-- COVERED TERRACE (right col, lower 2 rows) -->
  <rect x="390" y="303" width="146" height="285" fill="#DFF1D5"/>
  <!-- terrace pattern -->
  <line x1="390" y1="320" x2="410" y2="303" stroke="#B5D9A0" stroke-width="0.8"/>
  <line x1="416" y1="320" x2="436" y2="303" stroke="#B5D9A0" stroke-width="0.8"/>
  <line x1="442" y1="320" x2="462" y2="303" stroke="#B5D9A0" stroke-width="0.8"/>
  <line x1="468" y1="320" x2="488" y2="303" stroke="#B5D9A0" stroke-width="0.8"/>
  <line x1="494" y1="320" x2="514" y2="303" stroke="#B5D9A0" stroke-width="0.8"/>
  <text x="463" y="425" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#2D5A27">COVERED</text>
  <text x="463" y="442" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#2D5A27">TERRACE</text>
  <text x="463" y="459" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#6AAB50">30 m²</text>

  <!-- Horizontal wall before garden -->
  <rect x="56" y="588" width="334" height="5" fill="#374151"/>

  <!-- GARDEN -->
  <rect x="56" y="593" width="334" height="71" fill="url(#garden)"/>
  <rect x="56" y="593" width="334" height="71" fill="#C8E8A8" opacity="0.4"/>
  <text x="223" y="632" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#2D5A27">PRIVATE GARDEN</text>
  <text x="223" y="648" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#6AAB50">~100 m² · landscaped</text>

  <!-- ── DIMENSIONS ──────────────────────────────────── -->
  <!-- Width dimension -->
  <line x1="50" y1="680" x2="546" y2="680" stroke="#9CA3AF" stroke-width="0.8"/>
  <line x1="50" y1="676" x2="50" y2="684" stroke="#9CA3AF" stroke-width="0.8"/>
  <line x1="546" y1="676" x2="546" y2="684" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="298" y="692" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">≈ 16 m</text>

  <!-- ── NORTH ARROW ─────────────────────────────────── -->
  <g transform="translate(556,110)">
    <circle cx="0" cy="0" r="17" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
    <polygon points="0,-12 -4,4 0,0 4,4" fill="#1A3810"/>
    <polygon points="0,0 -4,4 0,12 4,4" fill="#9CA3AF"/>
    <text x="0" y="26" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" font-weight="700" fill="#374151">N</text>
  </g>

  <!-- ── FOOTER ──────────────────────────────────────── -->
  <rect x="0" y="732" width="600" height="68" fill="#F4F9EF"/>
  <line x1="0" y1="732" x2="600" y2="732" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Legend -->
  <rect x="30" y="750" width="10" height="10" rx="2" fill="#EBF3FA"/>
  <text x="44" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Bedroom</text>
  <rect x="100" y="750" width="10" height="10" rx="2" fill="#E8F4FB"/>
  <text x="114" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Bathroom</text>
  <rect x="178" y="750" width="10" height="10" rx="2" fill="#F5F9F1"/>
  <text x="192" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Living / Dining</text>
  <rect x="280" y="750" width="10" height="10" rx="2" fill="#DFF1D5"/>
  <text x="294" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Outdoor</text>
  <rect x="350" y="750" width="10" height="10" rx="2" fill="#ECEAE5"/>
  <text x="364" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Garage / Service</text>

  <text x="300" y="782" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">Deddeh Hills Gated Community · Koura, Lebanon · For illustration purposes only</text>
</svg>
