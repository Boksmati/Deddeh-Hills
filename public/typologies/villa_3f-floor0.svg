  <line x1="200" y1="527" x2="200" y2="717" stroke="#A8D890" stroke-width="0.8"/>
  <line x1="230" y1="527" x2="230" y2="717" stroke="#A8D890" stroke-width="0.8"/>
  <line x1="260" y1="527" x2="260" y2="717" stroke="#A8D890" stroke-width="0.8"/>

