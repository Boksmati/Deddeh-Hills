  <rect x="292" y="147" width="170" height="185" fill="#FBF8F4"/>
  <rect x="308" y="162" width="120" height="70" rx="5" fill="none" stroke="#C8C0B0" stroke-width="1.5"/>
  <rect x="308" y="162" width="120" height="20" rx="4" fill="#E0D8C8" opacity="0.7"/>
  <rect x="436" y="168" width="18" height="52" rx="3" fill="none" stroke="#C8C0B0" stroke-width="1.2"/>
