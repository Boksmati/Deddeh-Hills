  <rect x="292" y="332" width="170" height="130" fill="#FFF8F2"/>
  <ellipse cx="377" cy="397" rx="52" ry="28" fill="none" stroke="#C8B090" stroke-width="1.5"/>
  <circle cx="377" cy="365" r="9" fill="none" stroke="#C8B090" stroke-width="1"/>
  <circle cx="377" cy="429" r="9" fill="none" stroke="#C8B090" stroke-width="1"/>
