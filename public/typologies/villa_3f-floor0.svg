  <line x1="292" y1="462" x2="638" y2="462" stroke="#374151" stroke-width="2"/>
  <line x1="292" y1="582" x2="638" y2="582" stroke="#374151" stroke-width="2"/>
  <line x1="462" y1="147" x2="462" y2="717" stroke="#374151" stroke-width="2"/>
  <line x1="380" y1="582" x2="380" y2="717" stroke="#374151" stroke-width="2"/>
  <line x1="60" y1="527" x2="290" y2="527" stroke="#374151" stroke-width="2"/>

