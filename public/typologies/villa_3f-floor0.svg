  <ellipse cx="316" cy="604" rx="13" ry="16" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <rect x="340" y="596" width="24" height="28" rx="11" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <text x="336" y="648" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#374151">WC</text>
  <text x="336" y="661" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="7" fill="#9CA3AF">5 m²</text>

