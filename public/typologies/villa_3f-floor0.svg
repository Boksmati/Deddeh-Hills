  <line x1="0" y1="768" x2="700" y2="768" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="30" y="780" width="155" height="36" rx="5" fill="#2D5A27"/>
  <text x="107" y="795" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" font-weight="600" fill="#95CC58">GROUND FLOOR</text>
  <text x="107" y="810" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">BUA ≈ 281 m²</text>
  <rect x="197" y="780" width="130" height="36" rx="5" fill="#374151"/>
  <text x="262" y="795" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">EXPLOITATION</text>
  <text x="262" y="810" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="white">~200 m² · 40%</text>
  <rect x="339" y="780" width="130" height="36" rx="5" fill="#374151"/>
