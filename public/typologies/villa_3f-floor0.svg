  <rect x="160" y="828" width="10" height="10" rx="2" fill="#5BA8CC" opacity="0.6"/>
  <text x="174" y="837" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Pool</text>
  <rect x="210" y="828" width="10" height="10" rx="2" fill="#DFF1D5"/>
