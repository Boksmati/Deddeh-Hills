<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900">
  <defs>
    <pattern id="pool3f0" patternUnits="userSpaceOnUse" width="10" height="10">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#5BA8CC" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <pattern id="deck3f0" patternUnits="userSpaceOnUse" width="12" height="4">
      <line x1="0" y1="0" x2="12" y2="0" stroke="#C8B898" stroke-width="0.7" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="700" height="900" fill="#FAFAF9"/>

  <!-- Header -->
  <rect x="0" y="0" width="700" height="72" fill="#1A3810"/>
  <text x="30" y="26" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="30" y="50" font-family="'DM Sans',sans-serif" font-size="18" font-weight="700" fill="white">Villa 3F — Ground Floor</text>
  <text x="30" y="65" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">indicative · based on architectural drawings · Lot ~1210 m² · BUA ≈ 281 m²</text>

  <!-- Road top -->
  <rect x="0" y="82" width="700" height="36" fill="#E8E4DC"/>
  <line x1="0" y1="100" x2="700" y2="100" stroke="white" stroke-width="2" stroke-dasharray="20,12" opacity="0.5"/>
  <text x="350" y="96" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF" letter-spacing="3">MAIN ROAD</text>

  <!-- Building outer wall -->
  <rect x="54" y="129" width="589" height="588" rx="2" fill="none" stroke="#374151" stroke-width="3"/>
  <!-- Floor level tag -->
  <rect x="54" y="129" width="589" height="18" fill="#2D5A27" opacity="0.85"/>
  <text x="348" y="142" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="700" fill="#95CC58" letter-spacing="2">GROUND FLOOR — GF</text>

  <!-- ── SWIMMING POOL + TERRACE (left side, dominant) ──── -->
  <!-- Terrace deck -->
  <rect x="60" y="147" width="230" height="380" fill="url(#deck3f0)"/>
  <rect x="60" y="147" width="230" height="380" fill="#E8D8B8" opacity="0.25"/>
  <!-- Pool water -->
  <rect x="78" y="165" width="180" height="295" rx="5" fill="url(#pool3f0)"/>
  <rect x="78" y="165" width="180" height="295" rx="5" fill="#5BA8CC" opacity="0.56"/>
  <rect x="78" y="165" width="180" height="10" rx="3" fill="#7DC8E8" opacity="0.7"/>
  <!-- Pool coping -->
  <rect x="73" y="160" width="190" height="305" rx="6" fill="none" stroke="#A8D8F0" stroke-width="2.5"/>
  <text x="168" y="312" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.95">SWIMMING</text>
  <text x="168" y="329" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.95">POOL</text>
  <text x="168" y="347" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">~60 m²</text>
