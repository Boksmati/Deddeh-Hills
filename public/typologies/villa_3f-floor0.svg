  <rect x="462" y="147" width="175" height="185" fill="#F5F9F1"/>
  <rect x="476" y="162" width="105" height="65" rx="5" fill="none" stroke="#A8C99A" stroke-width="1.5"/>
  <rect x="476" y="162" width="105" height="18" rx="4" fill="#C8E0B8" opacity="0.5"/>
  <text x="549" y="268" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#2D5A27">SITTING</text>
  <text x="549" y="283" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#2D5A27">ROOM</text>
  <text x="549" y="298" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">~32 m²</text>

