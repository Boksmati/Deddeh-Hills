  <rect x="270" y="828" width="10" height="10" rx="2" fill="#E8F4FB"/>
  <text x="284" y="837" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">WC</text>
  <text x="350" y="876" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">Deddeh Hills Gated Community · Koura, Lebanon · For illustration purposes only</text>
