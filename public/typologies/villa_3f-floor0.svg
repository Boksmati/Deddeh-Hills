    <circle cx="0" cy="0" r="18" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
    <polygon points="0,-13 -4,5 0,0 4,5" fill="#1A3810"/>
    <polygon points="0,0 -4,5 0,13 4,5" fill="#9CA3AF"/>
    <text x="0" y="27" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" font-weight="700" fill="#374151">N</text>
  </g>

  <!-- Dimension line -->
  <line x1="54" y1="740" x2="643" y2="740" stroke="#9CA3AF" stroke-width="0.8"/>
  <line x1="54" y1="736" x2="54" y2="744" stroke="#9CA3AF" stroke-width="0.8"/>
  <line x1="643" y1="736" x2="643" y2="744" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="349" y="754" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">≈ 35 m</text>

