<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <!-- Background -->
  <rect width="600" height="800" fill="#FAFAF9"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="600" height="72" fill="#1A3810"/>
  <text x="30" y="28" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#78BF42" letter-spacing="3">DEDDEH HILLS</text>
  <text x="30" y="50" font-family="'DM Sans',sans-serif" font-size="18" font-weight="700" fill="white">Villa 2F — First Floor</text>
  <text x="30" y="64" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">indicative · not to scale · BUA ~185 m²</text>

  <!-- Building shadow -->
  <rect x="54" y="92" width="496" height="580" rx="3" fill="#D1D5DB" opacity="0.4"/>

  <!-- Building outer wall -->
  <rect x="50" y="88" width="496" height="580" rx="2" fill="#374151"/>

  <!-- ── ROOMS ──────────────────────────────────────────── -->

  <!-- MASTER BEDROOM (spans left + center, full top row) -->
  <rect x="56" y="94" width="270" height="210" fill="#EBF3FA"/>
  <!-- master bed symbol -->
  <rect x="80" y="110" width="200" height="100" rx="6" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <rect x="80" y="110" width="200" height="30" rx="6" fill="#B8D9E8" opacity="0.5"/>
  <text x="191" y="230" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" font-weight="700" fill="#2D5A27">MASTER</text>
  <text x="191" y="247" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" font-weight="700" fill="#2D5A27">BEDROOM</text>
  <text x="191" y="264" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">22 m²</text>

  <!-- MASTER BATHROOM (right column top) -->
  <rect x="330" y="94" width="110" height="100" fill="#E8F4FB"/>
  <!-- bath tub symbol -->
  <rect x="342" y="108" width="86" height="45" rx="20" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <text x="385" y="170" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#374151">MASTER WC</text>
  <text x="385" y="182" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">7 m²</text>

  <!-- WALK-IN WARDROBE (right column, below master WC) -->
  <rect x="444" y="94" width="96" height="100" fill="#F0EEF9"/>
  <text x="492" y="135" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#374151">WALK-IN</text>
  <text x="492" y="149" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#374151">WARDROBE</text>
  <text x="492" y="163" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">8 m²</text>

  <!-- MASTER WC AREA continued (right, lower section) -->
  <rect x="330" y="198" width="210" height="106" fill="#E8F4FB"/>
  <!-- shower + toilet symbols -->
  <rect x="345" y="212" width="50" height="50" rx="4" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <circle cx="370" cy="237" r="10" fill="none" stroke="#7DB9D4" stroke-width="1" stroke-dasharray="3,2"/>
  <ellipse cx="460" cy="237" rx="14" ry="20" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <text x="492" y="288" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">ensuite</text>

  <!-- Horizontal wall row 1 / row 2 -->
  <rect x="56" y="304" width="480" height="5" fill="#374151"/>

  <!-- BEDROOM 2 (left col, middle) -->
  <rect x="56" y="309" width="180" height="160" fill="#EBF3FA"/>
  <rect x="72" y="325" width="140" height="80" rx="5" fill="none" stroke="#93C5D8" stroke-width="1.5"/>
  <rect x="72" y="325" width="140" height="24" rx="5" fill="#B8D9E8" opacity="0.5"/>
  <text x="146" y="415" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#374151">BEDROOM 2</text>
  <text x="146" y="430" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">14 m²</text>

  <!-- Vertical wall center -->
  <rect x="236" y="309" width="5" height="165" fill="#374151"/>

  <!-- BEDROOM 3 (center, middle) -->
  <rect x="241" y="309" width="165" height="160" fill="#EBF3FA"/>
  <rect x="258" y="325" width="130" height="75" rx="5" fill="none" stroke="#93C5D8" stroke-width="1.5"/>
  <rect x="258" y="325" width="130" height="22" rx="5" fill="#B8D9E8" opacity="0.5"/>
  <text x="324" y="415" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#374151">BEDROOM 3</text>
  <text x="324" y="430" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">13 m²</text>

  <!-- Vertical wall right -->
  <rect x="406" y="309" width="5" height="165" fill="#374151"/>

  <!-- BEDROOM 4 (right col, middle) -->
  <rect x="411" y="309" width="125" height="160" fill="#EBF3FA"/>
  <rect x="422" y="325" width="103" height="70" rx="5" fill="none" stroke="#93C5D8" stroke-width="1.5"/>
  <rect x="422" y="325" width="103" height="20" rx="5" fill="#B8D9E8" opacity="0.5"/>
  <text x="474" y="415" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" fill="#374151">BEDROOM 4</text>
  <text x="474" y="430" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">12 m²</text>

  <!-- Horizontal wall row 2 / row 3 -->
  <rect x="56" y="469" width="480" height="5" fill="#374151"/>

  <!-- FAMILY LOUNGE (left + center, lower) -->
  <rect x="56" y="474" width="310" height="120" fill="#F5F9F1"/>
  <!-- sofa -->
  <rect x="70" y="508" width="180" height="45" rx="5" fill="none" stroke="#A8C99A" stroke-width="1.5"/>
  <rect x="70" y="508" width="180" height="16" rx="4" fill="#C8E0B8" opacity="0.5"/>
  <text x="211" y="502" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#374151">FAMILY ROOM</text>
  <text x="211" y="568" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">28 m²</text>

  <!-- BATHROOM (right col, lower left) -->
  <rect x="370" y="474" width="90" height="120" fill="#E8F4FB"/>
  <ellipse cx="395" cy="510" rx="12" ry="16" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <rect x="418" y="500" width="20" height="26" rx="10" fill="none" stroke="#7DB9D4" stroke-width="1.5"/>
  <text x="415" y="560" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#374151">BATH 2</text>
  <text x="415" y="572" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">6 m²</text>

  <!-- Vertical wall before staircase -->
  <rect x="460" y="469" width="5" height="125" fill="#374151"/>

  <!-- STAIRCASE (right, lower) -->
  <rect x="465" y="474" width="71" height="120" fill="#F0EEE8"/>
  <!-- stair lines -->
  <line x1="465" y1="494" x2="536" y2="494" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="465" y1="510" x2="536" y2="510" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="465" y1="526" x2="536" y2="526" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="465" y1="542" x2="536" y2="542" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="465" y1="558" x2="536" y2="558" stroke="#9CA3AF" stroke-width="1"/>
  <text x="500" y="575" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">STAIRS</text>

  <!-- Horizontal wall row 3 / balcony -->
  <rect x="56" y="594" width="480" height="5" fill="#374151"/>

  <!-- BALCONY -->
  <rect x="56" y="599" width="480" height="65" fill="#D5EFCA"/>
  <line x1="56" y1="625" x2="536" y2="625" stroke="#A8CC98" stroke-width="0.8" stroke-dasharray="8,4"/>
  <text x="296" y="618" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" font-weight="700" fill="#2D5A27">MAIN BALCONY</text>
  <text x="296" y="648" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#6AAB50">full width · 18 m² · mountain views</text>

  <!-- ── NORTH ARROW ──────────────────────────────── -->
  <g transform="translate(556,110)">
    <circle cx="0" cy="0" r="17" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
    <polygon points="0,-12 -4,4 0,0 4,4" fill="#1A3810"/>
    <polygon points="0,0 -4,4 0,12 4,4" fill="#9CA3AF"/>
    <text x="0" y="26" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" font-weight="700" fill="#374151">N</text>
  </g>

  <!-- ── FOOTER ──────────────────────────────────── -->
  <rect x="0" y="732" width="600" height="68" fill="#F4F9EF"/>
  <line x1="0" y1="732" x2="600" y2="732" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="30" y="750" width="10" height="10" rx="2" fill="#EBF3FA"/>
  <text x="44" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Bedroom</text>
  <rect x="100" y="750" width="10" height="10" rx="2" fill="#E8F4FB"/>
  <text x="114" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Bathroom</text>
  <rect x="178" y="750" width="10" height="10" rx="2" fill="#F5F9F1"/>
  <text x="192" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Living</text>
  <rect x="230" y="750" width="10" height="10" rx="2" fill="#D5EFCA"/>
  <text x="244" y="759" font-family="'DM Sans',sans-serif" font-size="8" fill="#6B7280">Balcony</text>
  <text x="300" y="782" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#9CA3AF">Deddeh Hills Gated Community · Koura, Lebanon · For illustration purposes only</text>
</svg>
